<!-- Chatbot WoMi reutilizable -->
<div id="chatbot-wrapper">
  <div class="chatbot-icon" onclick="toggleChatbot()">
    <img src="img/womi.webp" alt="Chatbot WoMo" width="34" height="34">
  </div>

  <div id="chatbot-window" aria-live="polite">
    <div class="chatbot-header">
      <div class="chatbot-avatar">
        <img src="img/womi.webp" alt="Asistente WoMi" loading="lazy" width="40" height="40" decoding="async">
      </div>
      <div class="chatbot-title">
        <h3>Asistente WoMi</h3>
        <p>¿En qué puedo ayudarte hoy?</p>
      </div>
      <button class="chatbot-close" onclick="closeChatbot()" aria-label="Cerrar">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="chatbot-messages" id="chatbot-messages"></div>
    <div class="quick-options" id="quick-options"></div>

    <div class="input-wrapper">
      <input type="text" id="chatbot-input" placeholder="Escribe tu mensaje..." autocomplete="off">
      <button onclick="sendMessage()" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
</div>
